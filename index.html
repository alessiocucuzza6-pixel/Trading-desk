<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="TD PRO"/>
  <meta name="theme-color" content="#f0a500"/>
  <title>Trading Desk Pro</title>
  <link rel="manifest" href="manifest.json"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Outfit:wght@400;500;600;700;800&display=swap');
    :root{
      --bg:#0d1117;--s0:#131920;--s1:#171f2a;--s2:#1c2535;--s3:#222e40;
      --b1:#263042;--b2:#2e3a50;--b3:#3a4d6a;
      --acc:#f0a500;--acc2:#ffbe33;--acc3:#fff3cc;
      --acc-dim:rgba(240,165,0,.12);--acc-glow:rgba(240,165,0,.08);
      --grn:#00e676;--grn2:#69f0ae;--grn-dim:rgba(0,230,118,.12);
      --red:#ff3d57;--red2:#ff8095;--red-dim:rgba(255,61,87,.12);
      --blu:#4dabf7;--blu-dim:rgba(77,171,247,.12);
      --org:#ff9800;--org-dim:rgba(255,152,0,.12);
      --t0:#e8edf4;--t1:#b0bcc8;--t2:#6b7a8d;--t3:#3a4558;
      --r:8px;--r2:12px;--r3:16px;
      --font-disp:'Bebas Neue',sans-serif;
      --font-body:'Outfit',sans-serif;
      --font-mono:'DM Mono',monospace;
      --shadow-card:0 4px 24px rgba(0,0,0,.4);
      --shadow-glow:0 0 20px rgba(240,165,0,.15);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{
      background:var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(240,165,0,.06) 0%, transparent 60%),
        linear-gradient(180deg, rgba(77,171,247,.02) 0%, transparent 40%);
      color:var(--t0);font-family:var(--font-body);font-size:13px;line-height:1.55;min-height:100vh;
      -webkit-font-smoothing:antialiased;
    }
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:var(--bg);}
    ::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
    input,select,textarea,button{font-family:var(--font-body);font-size:13px;}

    /* ── LAYOUT ── */
    .app{max-width:1280px;margin:0 auto;padding:0 16px 72px;}

    /* ── HEADER ── */
    .hdr{
      display:flex;align-items:center;justify-content:space-between;
      padding:20px 0 18px;
      border-bottom:1px solid var(--b1);margin-bottom:22px;
      position:relative;
    }
    .hdr::after{content:'';position:absolute;bottom:-1px;left:0;width:80px;height:2px;background:linear-gradient(90deg,var(--acc),transparent);}
    .hdr-left{display:flex;align-items:center;gap:14px;}
    .hdr-logo{
      width:38px;height:38px;background:linear-gradient(135deg,var(--acc),#c07800);
      border-radius:10px;display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 16px rgba(240,165,0,.3),inset 0 1px 0 rgba(255,255,255,.1);
      flex-shrink:0;
    }
    .hdr-title{font-family:var(--font-disp);font-size:24px;letter-spacing:.5px;color:var(--t0);line-height:1;}
    .hdr-sub{font-family:var(--font-mono);font-size:10px;color:var(--t2);letter-spacing:.1em;margin-top:3px;}
    .capital-chip{
      background:linear-gradient(135deg,var(--s2),var(--s3));
      border:1px solid var(--b2);border-radius:var(--r);
      padding:8px 16px;font-family:var(--font-disp);font-size:17px;
      color:var(--acc);letter-spacing:.04em;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }

    /* ── TABS ── */
    .tabs{
      display:flex;gap:0;margin-bottom:22px;
      background:var(--s0);border:1px solid var(--b1);
      border-radius:var(--r2);padding:5px;overflow-x:auto;
      box-shadow:var(--shadow-card);
    }
    .tab{
      flex:1;min-width:52px;padding:10px 8px;border:none;
      background:transparent;color:var(--t2);
      font-family:var(--font-body);font-size:12px;font-weight:600;
      letter-spacing:.04em;cursor:pointer;border-radius:8px;
      transition:all .2s;white-space:nowrap;
      display:flex;align-items:center;justify-content:center;gap:6px;
    }
    .tab-icon{font-size:14px;line-height:1;}
    .tab:hover:not(.on){background:var(--s2);color:var(--t1);}
    .tab.on{
      background:linear-gradient(135deg,var(--acc),#c87f00);
      color:#000;font-weight:700;
      box-shadow:0 2px 14px rgba(240,165,0,.35),inset 0 1px 0 rgba(255,255,255,.15);
    }
    .tab-badge{
      background:var(--red);color:#fff;border-radius:10px;
      font-size:9px;padding:1px 6px;font-weight:800;line-height:1.4;
    }

    /* ── CARDS ── */
    .card{
      background:var(--s1);
      border:1px solid var(--b1);
      border-radius:var(--r2);padding:20px;margin-bottom:16px;
      box-shadow:var(--shadow-card);
      position:relative;overflow:hidden;
    }
    .card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(240,165,0,.2),rgba(77,171,247,.1),transparent);
    }
    .card-title{
      font-family:var(--font-body);font-size:11px;font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;color:var(--t2);
      margin-bottom:18px;display:flex;align-items:center;gap:8px;
    }
    .card-title-dot{
      width:8px;height:8px;background:var(--acc);border-radius:50%;
      box-shadow:0 0 8px rgba(240,165,0,.5);flex-shrink:0;
    }

    /* ── MODES ── */
    .modes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
    .mode{
      padding:14px 12px;border:1px solid var(--b2);
      background:var(--s2);color:var(--t2);
      border-radius:var(--r);cursor:pointer;text-align:center;
      transition:all .2s;position:relative;overflow:hidden;
    }
    .mode::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(240,165,0,0),rgba(240,165,0,.04));opacity:0;transition:opacity .2s;}
    .mode:hover::before,.mode.on::before{opacity:1;}
    .mode.on{border-color:var(--acc);background:var(--s3);box-shadow:0 0 16px rgba(240,165,0,.1),inset 0 1px 0 rgba(240,165,0,.08);}
    .mode-label{font-family:var(--font-disp);font-size:18px;display:block;letter-spacing:.04em;color:var(--t0);}
    .mode.on .mode-label{color:var(--acc);}
    .mode-meta{font-family:var(--font-mono);font-size:9px;opacity:.55;display:block;margin-top:3px;}

    /* ── FIELDS ── */
    .fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;margin-bottom:14px;}
    .fgrid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
    .fgrid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
    .field{display:flex;flex-direction:column;gap:6px;}
    .field label{
      font-family:var(--font-mono);font-size:9.5px;color:var(--t2);
      letter-spacing:.1em;text-transform:uppercase;font-weight:500;
    }
    .field input,.field select,.field textarea{
      background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);
      padding:10px 12px;color:var(--t0);outline:none;
      transition:border-color .18s,box-shadow .18s;width:100%;
      box-shadow:inset 0 1px 3px rgba(0,0,0,.2);
    }
    .field input:focus,.field select:focus,.field textarea:focus{
      border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-dim),inset 0 1px 3px rgba(0,0,0,.2);
    }
    .field select option{background:var(--s2);}

    /* ── COMBOBOX ── */
    .combo-wrap{position:relative;}
    .combo-input{
      background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);
      padding:10px 12px;color:var(--t0);outline:none;
      transition:border-color .18s,box-shadow .18s;width:100%;
      box-shadow:inset 0 1px 3px rgba(0,0,0,.2);
    }
    .combo-input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-dim);}
    .combo-dropdown{
      position:absolute;top:calc(100% + 5px);left:0;right:0;
      background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);
      z-index:999;max-height:210px;overflow-y:auto;
      box-shadow:0 12px 32px rgba(0,0,0,.6),0 0 0 1px rgba(240,165,0,.06);
    }
    .combo-item{
      padding:10px 12px;cursor:pointer;font-size:12.5px;
      border-bottom:1px solid var(--b1);transition:all .12s;color:var(--t1);
    }
    .combo-item:last-child{border-bottom:none;}
    .combo-item:hover{background:var(--acc-dim);color:var(--acc);}

    /* ── RESULT BOXES ── */
    .rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:16px;}
    .rbox{
      background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);
      padding:14px;transition:border-color .2s;
    }
    .rl{font-family:var(--font-mono);font-size:9px;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
    .rv{font-family:var(--font-disp);font-size:26px;font-weight:400;line-height:1;letter-spacing:.02em;}
    .ru{font-family:var(--font-mono);font-size:10px;color:var(--t2);margin-left:2px;}
    .rbox.hi{border-color:rgba(240,165,0,.3);background:linear-gradient(135deg,var(--s2),rgba(240,165,0,.05));}
    .rbox.hi .rv{color:var(--acc);}
    .rbox.gd{border-color:rgba(0,230,118,.2);}.rbox.gd .rv{color:var(--grn);}
    .rbox.bd{border-color:rgba(255,61,87,.2);}.rbox.bd .rv{color:var(--red);}

    /* ── ALERTS ── */
    .alert{
      display:flex;align-items:center;gap:9px;padding:9px 13px;
      border-radius:var(--r);margin-top:8px;font-size:12px;border:1px solid;font-weight:500;
    }
    .alert.ok{background:var(--grn-dim);color:var(--grn2);border-color:rgba(0,230,118,.2);}
    .alert.warn{background:var(--red-dim);color:var(--red2);border-color:rgba(255,61,87,.2);}
    .alert.info{background:var(--blu-dim);color:var(--blu);border-color:rgba(77,171,247,.2);}

    /* ── BUTTONS ── */
    .btn{
      padding:10px 20px;border:none;border-radius:var(--r);cursor:pointer;
      font-family:var(--font-body);font-size:13px;font-weight:700;
      letter-spacing:.04em;transition:all .2s;
      display:inline-flex;align-items:center;gap:7px;
    }
    .btn:disabled{opacity:.3;cursor:not-allowed;}
    .btn-p{
      background:linear-gradient(135deg,var(--acc),#c87f00);color:#000;
      box-shadow:0 3px 12px rgba(240,165,0,.3),inset 0 1px 0 rgba(255,255,255,.15);
    }
    .btn-p:hover:not(:disabled){background:linear-gradient(135deg,var(--acc2),#d98a00);box-shadow:0 5px 20px rgba(240,165,0,.45);}
    .btn-g{background:var(--s2);border:1px solid var(--b2);color:var(--t1);}
    .btn-g:hover{border-color:var(--acc);color:var(--acc);}
    .btn-sm{padding:6px 12px;font-size:11.5px;}
    .brow{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-top:16px;}

    /* ── KPI GRID ── */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:10px;margin-bottom:18px;}
    .kpi{
      background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
      padding:14px 16px;position:relative;overflow:hidden;
      transition:border-color .2s,transform .15s;
    }
    .kpi:hover{border-color:var(--b2);transform:translateY(-1px);}
    .kpi-l{font-family:var(--font-mono);font-size:9px;color:var(--t2);letter-spacing:.09em;text-transform:uppercase;margin-bottom:6px;}
    .kpi-v{font-family:var(--font-disp);font-size:24px;line-height:1;letter-spacing:.02em;}
    .kpi-v.up{color:var(--grn);}
    .kpi-v.dn{color:var(--red);}
    .kpi-v.ac{color:var(--acc);}

    /* ── TABLE ── */
    .mobile-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .jtable{width:100%;border-collapse:collapse;font-size:12px;}
    .jtable th{
      text-align:left;padding:9px 12px;
      font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;
      text-transform:uppercase;color:var(--t3);
      border-bottom:1px solid var(--b2);white-space:nowrap;
      background:var(--s2);
    }
    .jtable td{
      padding:10px 12px;border-bottom:1px solid var(--b1);
      vertical-align:middle;white-space:nowrap;color:var(--t1);
    }
    .jtable tr:last-child td{border-bottom:none;}
    .jtable tr.open-row td{background:rgba(240,165,0,.025);}
    .jtable tr:hover td{background:var(--s2);cursor:pointer;color:var(--t0);}

    /* ── TAGS ── */
    .tag{
      display:inline-block;padding:3px 9px;border-radius:5px;
      font-family:var(--font-body);font-size:10px;font-weight:700;letter-spacing:.05em;
    }
    .t-scalp{background:var(--blu-dim);color:var(--blu);}
    .t-intraday{background:var(--acc-dim);color:var(--acc);}
    .t-swing{background:var(--grn-dim);color:var(--grn);}
    .t-win{background:var(--grn-dim);color:var(--grn);}
    .t-loss{background:var(--red-dim);color:var(--red);}
    .t-open{background:var(--acc-dim);color:var(--acc);animation:pulse 2.5s infinite;}
    .t-long{background:var(--grn-dim);color:var(--grn);}
    .t-short{background:var(--red-dim);color:var(--red);}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.45;}}
    .del-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:3px 8px;border-radius:4px;transition:color .15s;}
    .del-btn:hover{color:var(--red);}

    /* ── CHECKLIST SCORE ── */
    .cl-score{display:inline-flex;align-items:center;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700;}
    .cl-score.full{background:var(--grn-dim);color:var(--grn);}
    .cl-score.part{background:var(--org-dim);color:var(--org);}
    .cl-score.none{background:rgba(100,100,100,.08);color:var(--t3);}

    /* ── CHECKLIST ── */
    .cl-sec{margin-bottom:8px;}
    .cl-hdr{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 14px;background:var(--s2);border:1px solid var(--b1);
      border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none;
      transition:border-color .15s;
    }
    .cl-hdr.done{border-color:rgba(0,230,118,.3);background:rgba(0,230,118,.04);}
    .cl-hdr-l{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
    .cl-stitle{font-family:var(--font-body);font-size:12px;font-weight:700;color:var(--t0);}
    .cl-tf{
      font-family:var(--font-mono);font-size:9px;color:var(--acc);
      background:var(--acc-dim);border:1px solid rgba(240,165,0,.15);
      padding:2px 8px;border-radius:4px;
    }
    .cl-items{border:1px solid var(--b1);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden;}
    .ci{
      display:flex;align-items:flex-start;gap:11px;padding:10px 14px;
      border-bottom:1px solid var(--s2);cursor:pointer;user-select:none;
      -webkit-tap-highlight-color:transparent;transition:background .12s;
    }
    .ci:last-child{border-bottom:none;}
    .ci:hover{background:var(--s3);}
    .ci.ck{background:rgba(0,230,118,.03);}
    .cbox{
      width:18px;height:18px;min-width:18px;border:1.5px solid var(--b2);
      border-radius:4px;margin-top:1px;display:flex;align-items:center;justify-content:center;
      transition:all .15s;font-size:10px;
    }
    .ci.ck .cbox{background:var(--grn);border-color:var(--grn);color:#000;}
    .citext{font-size:12px;line-height:1.55;color:var(--t1);flex:1;}
    .ci.ck .citext{color:var(--t3);text-decoration:line-through;}
    .cl-bar-wrap{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 14px;border-radius:var(--r);margin-bottom:10px;font-size:12px;
    }
    .cl-bar-wrap.all{background:var(--grn-dim);border:1px solid rgba(0,230,118,.2);color:var(--grn2);}
    .cl-bar-wrap.part{background:var(--org-dim);border:1px solid rgba(255,152,0,.2);color:var(--org);}
    .cl-bar-wrap.none{background:rgba(80,80,80,.06);border:1px solid var(--b1);color:var(--t2);}
    .cl-track{height:4px;background:var(--b1);border-radius:3px;flex:1;margin:0 14px;}
    .cl-fill{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1);}
    .cl-final{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 20px;border-radius:var(--r);margin-top:14px;
      font-family:var(--font-body);font-weight:700;font-size:13px;
    }
    .cl-final.ok{background:var(--grn-dim);border:1px solid rgba(0,230,118,.2);color:var(--grn);}
    .cl-final.no{background:var(--red-dim);border:1px solid rgba(255,61,87,.2);color:var(--red2);}

    /* ── MODAL ── */
    .overlay{
      position:fixed;inset:0;background:rgba(5,8,14,.92);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      z-index:1000;display:flex;align-items:flex-start;justify-content:center;
      padding:14px;overflow-y:auto;-webkit-overflow-scrolling:touch;
    }
    .modal{
      background:var(--s0);
      border:1px solid var(--b2);
      border-radius:var(--r3);width:100%;max-width:740px;margin:auto;padding:26px;
      animation:su .25s cubic-bezier(.16,1,.3,1);
      box-shadow:0 32px 80px rgba(0,0,0,.8),0 0 0 1px rgba(240,165,0,.05);
      position:relative;
    }
    .modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--acc),transparent);border-radius:var(--r3) var(--r3) 0 0;}
    @keyframes su{from{transform:translateY(20px) scale(.97);opacity:0;}to{transform:translateY(0) scale(1);opacity:1;}}
    .modal-title{font-family:var(--font-disp);font-size:24px;letter-spacing:.04em;margin-bottom:4px;}
    .modal-sub{font-family:var(--font-mono);font-size:11px;color:var(--t2);margin-bottom:20px;}
    .modal-tabs{display:flex;gap:4px;margin-bottom:18px;background:var(--bg);border-radius:var(--r);padding:4px;}
    .modal-tab{
      flex:1;padding:8px 6px;border:none;background:transparent;color:var(--t2);
      border-radius:6px;cursor:pointer;font-family:var(--font-body);font-size:11.5px;
      font-weight:700;letter-spacing:.05em;text-transform:uppercase;transition:all .18s;
    }
    .modal-tab.on{background:linear-gradient(135deg,var(--acc),#c87f00);color:#000;}
    .m-sec{margin-bottom:20px;}
    .m-stitle{
      font-family:var(--font-mono);font-size:9px;font-weight:500;letter-spacing:.12em;
      text-transform:uppercase;color:var(--t3);margin-bottom:10px;
      padding-bottom:6px;border-bottom:1px solid var(--b1);
    }
    .open-notice{
      display:flex;align-items:center;gap:8px;background:var(--acc-glow);
      border:1px solid rgba(240,165,0,.2);color:var(--acc);border-radius:var(--r);
      padding:10px 14px;font-size:12px;margin-bottom:12px;font-weight:500;
    }
    .close-box{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:16px;}
    .close-box-title{font-family:var(--font-mono);font-size:9px;font-weight:500;color:var(--t2);margin-bottom:12px;letter-spacing:.1em;text-transform:uppercase;}
    .out-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
    .out-btn{
      padding:13px 8px;border:1px solid var(--b2);background:var(--bg);color:var(--t2);
      border-radius:var(--r);cursor:pointer;font-family:var(--font-body);font-size:12px;
      font-weight:700;text-align:center;transition:all .18s;
    }
    .out-btn.win.on{border-color:var(--grn);background:var(--grn-dim);color:var(--grn);box-shadow:0 0 16px rgba(0,230,118,.1);}

function calcStats(trades){
  const s=loadSettings(),capital=parseFloat(s.capital)||10000;
  const closed=trades.filter(t=>t.outcome!=="open");
  const wins=closed.filter(t=>t.outcome==="win");
  const losses=closed.filter(t=>t.outcome==="loss");
  const totalPnl=closed.reduce((a,t)=>a+(parseFloat(t.pnlNetto)||0),0);
  const winPnl=wins.reduce((a,t)=>a+(parseFloat(t.pnlNetto)||0),0);
  const lossPnl=losses.reduce((a,t)=>a+(parseFloat(t.pnlNetto)||0),0);
  const wr=closed.length?wins.length/closed.length*100:0;
  const pf=lossPnl!==0?Math.abs(winPnl/lossPnl):winPnl>0?Infinity:0;
  const rrArr=closed.filter(t=>parseFloat(t.rr)>0).map(t=>parseFloat(t.rr));
  const avgRR=rrArr.length?rrArr.reduce((a,b)=>a+b,0)/rrArr.length:0;
  let equity=capital,maxEq=capital,maxDD=0;
  const curve=[{x:0,y:capital}];
  closed.forEach((t,i)=>{equity+=parseFloat(t.pnlNetto)||0;curve.push({x:i+1,y:+equity.toFixed(2)});if(equity>maxEq)maxEq=equity;const dd=equity-maxEq;if(dd<maxDD)maxDD=dd;});
  let maxCW=0,maxCL=0,cw=0,cl=0;
  closed.forEach(t=>{if(t.outcome==="win"){cw++;cl=0;if(cw>maxCW)maxCW=cw;}else{cl++;cw=0;if(cl>maxCL)maxCL=cl;}});
  const bestWin=wins.length?Math.max(...wins.map(t=>parseFloat(t.pnlNetto)||0)):0;
  const worstLoss=losses.length?Math.min(...losses.map(t=>parseFloat(t.pnlNetto)||0)):0;
  return{closed,wins,losses,totalPnl,winPnl,lossPnl,wr,pf,avgRR,curve,maxDD,maxCW,maxCL,capital,currentCapital:capital+totalPnl,avgWin:wins.length?winPnl/wins.length:0,avgLoss:losses.length?lossPnl/losses.length:0,bestWin,worstLoss};
}

  const a=document.createElement("a");

  a.download=`trading-desk-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();

function importData(file,onDone){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.trades&&Array.isArray(data.trades)){
        saveTrades(data.trades);
        if(data.settings) saveSettings(data.settings);
        onDone({ok:true,count:data.trades.length});
      } else {
        onDone({ok:false});
      }
    } catch{onDone({ok:false});}
  };
  reader.readAsText(file);
}

const getSyncUrl=()=>{try{return localStorage.getItem("tdpro_syncurl")||"";}catch{return "";}};
const setSyncUrl=url=>{try{localStorage.setItem("tdpro_syncurl",url);}catch{}};

async function syncPull(){
  const url=getSyncUrl();
  if(!url) return {ok:false,reason:"no_url"};
  try{
    const r=await fetch(url+"?action=read",{method:"GET"});
    const d=await r.json();
    if(d.error) return {ok:false,reason:d.error};
    if(d.trades&&Array.isArray(d.trades)){
      saveTrades(d.trades);
      if(d.settings) saveSettings(d.settings);
      return {ok:true,count:d.trades.length};
    }
    return {ok:false,reason:"bad_data"};
  }catch(e){return {ok:false,reason:e.message};}
}

async function syncPush(){
  const url=getSyncUrl();
  if(!url) return {ok:false,reason:"no_url"};
  try{
    const payload=encodeURIComponent(JSON.stringify({trades:loadTrades(),settings:loadSettings()}));
    const r=await fetch(url+"?action=write&data="+payload,{method:"GET"});
    const d=await r.json();
    return {ok:!!d.saved};
  }catch(e){return {ok:false,reason:e.message};}
}

function SyncModal({onClose,onSynced}){
  const [url,setUrl]=React.useState(getSyncUrl());
  const [status,setStatus]=React.useState(null);
  const [loading,setLoading]=React.useState(false);
  const ref=React.useRef(null);
  React.useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))onClose();};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[onClose]);

  const save=()=>{setSyncUrl(url.trim());setStatus({type:"info",msg:"URL salvato."});};

  const pull=async()=>{
    setSyncUrl(url.trim());
    setLoading(true);setStatus(null);
    const r=await syncPull();
    setLoading(false);
    if(r.ok){setStatus({type:"ok",msg:`Importati ${r.count} trade dal foglio.`});onSynced();}
    else setStatus({type:"err",msg:"Errore: "+r.reason});
  };

  const push=async()=>{
    setSyncUrl(url.trim());
    setLoading(true);setStatus(null);
    const r=await syncPush();
    setLoading(false);
    if(r.ok) setStatus({type:"ok",msg:"Trade inviati al foglio Google."});
    else setStatus({type:"err",msg:"Errore: "+r.reason});

  const statusStyle=(t)=>({

    border:`1px solid ${t==="ok"?"rgba(0,230,118,.2)":t==="err"?"rgba(255,61,87,.2)":"rgba(77,171,247,.2)"}`
  });

  return(
    <div className="overlay">
      <div className="modal" ref={ref} style={{maxWidth:480}}>
        <div className="modal-title" style={{color:"var(--acc)"}}>Sync Google Sheets</div>

        <div className="brow">

            style={{background:"linear-gradient(135deg,#00b894,#00836b)"}}>
            {loading?"...":"Esporta su Sheets"}

        </div>
        {status&&<div style={statusStyle(status.type)}>{status.msg}</div>}

        <div style={{marginTop:14,fontSize:10,color:"var(--t2)",borderLeft:"2px solid rgba(240,165,0,.25)",paddingLeft:12,lineHeight:1.7}}>

              <div className="hdr-sub">Schemi Istituzionali · Prop 10K</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button className="btn btn-g btn-sm" onClick={()=>setShowData(true)} style={{fontFamily:"var(--font-mono)",fontSize:11,letterSpacing:".06em"}}>BACKUP</button>
            <button className="btn btn-g btn-sm" onClick={()=>setShowSync(true)}
              style={{fontFamily:"var(--font-mono)",fontSize:11,letterSpacing:".06em",
                borderColor:syncActive?"rgba(0,230,118,.4)":"var(--b2)",
                color:syncActive?"var(--grn)":"var(--t2)"}}>
              {syncActive?"● SYNC":"SYNC"}
            </button>
            <div className="capital-chip" onClick={()=>setShowCapital(true)} style={{cursor:"pointer",userSelect:"none"}} title="Tocca per modificare il capitale">
              {(capital+totalPnl).toFixed(0)}€
            </div>
          </div>
        </div>
        <div className="tabs">
          {TABS.map(({k,icon,label,badge})=>(
            <button key={k} className={`tab ${tab===k?"on":""}`} onClick={()=>setTab(k)}>
              <span>{label}</span>
              {badge>0&&<span className="tab-badge">{badge}</span>}
            </button>
          ))}
        </div>
        {tab==="calc"&&<Calculator onOpenModal={setModal}/>}
        {tab==="journal"&&<Journal refreshKey={jKey} onCountChange={setOpenCount}/>}
        {tab==="dashboard"&&<Dashboard/>}
        {tab==="analisi"&&<Analisi/>}
        {tab==="checklist"&&<ChecklistTab/>}
        {tab==="cot"&&<CotTab/>}
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js"));</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="TD PRO"/>
  <meta name="theme-color" content="#e8a020"/>
  <title>Trading Desk Pro</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root{
      --bg:#060606;--s0:#0c0c0c;--s1:#111;--s2:#181818;--s3:#1f1f1f;
      --b1:#222;--b2:#2a2a2a;--b3:#333;
      --acc:#e8a020;--acc2:#f5b740;--acc-dim:rgba(232,160,32,.1);--acc-glow:rgba(232,160,32,.06);
      --grn:#39d98a;--grn-dim:rgba(57,217,138,.12);
      --red:#ff5252;--red-dim:rgba(255,82,82,.12);
      --blu:#448aff;--blu-dim:rgba(68,138,255,.12);
      --org:#ff9040;--org-dim:rgba(255,144,64,.12);
      --t0:#f0f0f0;--t1:#aaa;--t2:#666;--t3:#383838;
      --r:7px;--r2:10px;--r3:14px;
      --font-disp:'Barlow Condensed',sans-serif;
      --font-mono:'Fira Code',monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--t0);font-family:var(--font-mono);font-size:12.5px;line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased;}
    ::-webkit-scrollbar{width:3px;height:3px;}
    ::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}
    input,select,textarea,button{font-family:var(--font-mono);font-size:12.5px;}
    .app{max-width:1280px;margin:0 auto;padding:0 14px 60px;}
    .hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 0 16px;border-bottom:1px solid var(--b1);margin-bottom:20px;}
    .hdr-left{display:flex;align-items:center;gap:12px;}
    .hdr-logo{width:34px;height:34px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;}
    .hdr-title{font-family:var(--font-disp);font-size:22px;font-weight:900;color:var(--t0);}
    .hdr-sub{font-size:10px;color:var(--t2);letter-spacing:.08em;margin-top:2px;}
    .capital-chip{background:var(--s1);border:1px solid var(--b1);border-radius:6px;padding:6px 12px;font-family:var(--font-disp);font-size:14px;font-weight:700;color:var(--acc);}
    .tabs{display:flex;gap:0;margin-bottom:20px;background:var(--s0);border:1px solid var(--b1);border-radius:var(--r2);padding:4px;overflow-x:auto;}
    .tab{display:flex;align-items:center;gap:5px;flex:1;min-width:50px;padding:9px 8px;border:none;background:transparent;color:var(--t2);font-family:var(--font-disp);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-radius:6px;transition:all .18s;white-space:nowrap;justify-content:center;}
    .tab.on{background:var(--acc);color:#000;box-shadow:0 2px 12px rgba(232,160,32,.3);}
    .tab-badge{background:var(--red);color:#fff;border-radius:8px;font-size:9px;padding:1px 5px;font-weight:800;}
    .card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:18px;margin-bottom:14px;}
    .card-title{font-family:var(--font-disp);font-size:11px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--t2);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
    .card-title-dot{width:6px;height:6px;background:var(--acc);border-radius:50%;}
    .modes{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
    .mode{padding:13px 10px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);border-radius:var(--r);cursor:pointer;text-align:center;transition:all .18s;}
    .mode.on{border-color:var(--acc);color:var(--acc);background:rgba(232,160,32,.06);}
    .mode-label{font-family:var(--font-disp);font-size:15px;font-weight:800;display:block;}
    .mode-meta{font-size:9.5px;opacity:.6;display:block;margin-top:2px;}
    .fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-bottom:12px;}
    .fgrid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
    .fgrid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
    .field{display:flex;flex-direction:column;gap:5px;}
    .field label{font-size:9.5px;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;}
    .field input,.field select,.field textarea{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:9px 11px;color:var(--t0);outline:none;transition:border-color .15s;width:100%;}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-dim);}
    .field select option{background:var(--s2);}
    .combo-wrap{position:relative;}
    .combo-input{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:9px 11px;color:var(--t0);outline:none;transition:border-color .15s;width:100%;}
    .combo-input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-dim);}
    .combo-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);z-index:999;max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.7);}
    .combo-item{padding:9px 11px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--b1);transition:background .12s;}
    .combo-item:last-child{border-bottom:none;}
    .combo-item:hover{background:var(--acc-dim);color:var(--acc);}
    .rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:8px;margin-top:14px;}
    .rbox{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:13px;}
    .rl{font-size:9px;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
    .rv{font-family:var(--font-disp);font-size:22px;font-weight:800;}
    .ru{font-size:10px;color:var(--t2);margin-left:2px;}
    .rbox.hi{border-color:var(--acc);background:var(--acc-glow);}.rbox.hi .rv{color:var(--acc);}
    .rbox.gd .rv{color:var(--grn);}.rbox.bd .rv{color:var(--red);}
    .alert{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:var(--r);margin-top:7px;font-size:11px;border:1px solid;}
    .alert.ok{background:var(--grn-dim);color:var(--grn);border-color:rgba(57,217,138,.2);}
    .alert.warn{background:var(--red-dim);color:var(--red);border-color:rgba(255,82,82,.2);}
    .alert.info{background:var(--blu-dim);color:var(--blu);border-color:rgba(68,138,255,.2);}
    .btn{padding:9px 18px;border:none;border-radius:var(--r);cursor:pointer;font-family:var(--font-disp);font-size:13px;font-weight:800;letter-spacing:.07em;transition:all .18s;display:inline-flex;align-items:center;gap:6px;}
    .btn:disabled{opacity:.3;cursor:not-allowed;}
    .btn-p{background:var(--acc);color:#000;}.btn-p:hover:not(:disabled){background:var(--acc2);}
    .btn-g{background:transparent;border:1px solid var(--b2);color:var(--t2);}.btn-g:hover{border-color:var(--acc);color:var(--acc);}
    .btn-sm{padding:5px 11px;font-size:11px;}
    .brow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:14px;}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:8px;margin-bottom:16px;}
    .kpi{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:13px 14px;}
    .kpi-l{font-size:9px;color:var(--t2);letter-spacing:.09em;text-transform:uppercase;margin-bottom:5px;}
    .kpi-v{font-family:var(--font-disp);font-size:21px;font-weight:900;}
    .kpi-v.up{color:var(--grn);}.kpi-v.dn{color:var(--red);}.kpi-v.ac{color:var(--acc);}
    .mobile-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .jtable{width:100%;border-collapse:collapse;font-size:11.5px;}
    .jtable th{text-align:left;padding:8px 10px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--b1);font-family:var(--font-disp);font-weight:800;white-space:nowrap;}
    .jtable td{padding:9px 10px;border-bottom:1px solid var(--s2);vertical-align:middle;white-space:nowrap;}
    .jtable tr:last-child td{border-bottom:none;}
    .jtable tr:hover td{background:var(--s2);cursor:pointer;}
    .jtable tr.open-row td{background:rgba(232,160,32,.02);}
    .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9.5px;font-family:var(--font-disp);font-weight:800;}
    .t-scalp{background:var(--blu-dim);color:var(--blu);}
    .t-intraday{background:var(--acc-dim);color:var(--acc);}
    .t-swing{background:var(--grn-dim);color:var(--grn);}
    .t-win{background:var(--grn-dim);color:var(--grn);}
    .t-loss{background:var(--red-dim);color:var(--red);}
    .t-open{background:var(--acc-dim);color:var(--acc);animation:pulse 2s infinite;}
    .t-long{background:var(--grn-dim);color:var(--grn);}
    .t-short{background:var(--red-dim);color:var(--red);}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
    .del-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;padding:3px 7px;transition:color .15s;}
    .del-btn:hover{color:var(--red);}
    .cl-score{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:9.5px;font-family:var(--font-disp);font-weight:800;}
    .cl-score.full{background:var(--grn-dim);color:var(--grn);}
    .cl-score.part{background:var(--org-dim);color:var(--org);}
    .cl-score.none{background:rgba(80,80,80,.1);color:var(--t3);}
    .cl-sec{margin-bottom:7px;}
    .cl-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none;}
    .cl-hdr.done{border-color:var(--grn);}
    .cl-hdr-l{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .cl-stitle{font-family:var(--font-disp);font-size:12px;font-weight:800;}
    .cl-tf{font-size:9px;color:var(--t2);background:var(--bg);border:1px solid var(--b1);padding:2px 7px;border-radius:3px;}
    .cl-items{border:1px solid var(--b1);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden;}
    .ci{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-bottom:1px solid var(--s2);cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
    .ci:last-child{border-bottom:none;}
    .ci.ck{background:rgba(57,217,138,.03);}
    .cbox{width:16px;height:16px;min-width:16px;border:1.5px solid var(--b2);border-radius:3px;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .ci.ck .cbox{background:var(--grn);border-color:var(--grn);color:#000;font-size:9px;}
    .citext{font-size:11px;line-height:1.55;color:var(--t0);flex:1;}
    .ci.ck .citext{color:var(--t2);text-decoration:line-through;}
    .cl-bar-wrap{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-radius:var(--r);margin-bottom:9px;font-size:11px;}
    .cl-bar-wrap.all{background:var(--grn-dim);border:1px solid rgba(57,217,138,.2);color:var(--grn);}
    .cl-bar-wrap.part{background:var(--org-dim);border:1px solid rgba(255,144,64,.2);color:var(--org);}
    .cl-bar-wrap.none{background:rgba(80,80,80,.06);border:1px solid var(--b1);color:var(--t2);}
    .cl-track{height:3px;background:var(--b1);border-radius:2px;flex:1;margin:0 12px;}
    .cl-fill{height:100%;border-radius:2px;transition:width .35s;}
    .cl-final{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-radius:var(--r);margin-top:12px;font-family:var(--font-disp);font-weight:800;font-size:13px;}
    .cl-final.ok{background:var(--grn-dim);border:1px solid rgba(57,217,138,.2);color:var(--grn);}
    .cl-final.no{background:var(--red-dim);border:1px solid rgba(255,82,82,.2);color:var(--red);}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:12px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    .modal{background:var(--s0);border:1px solid var(--b2);border-radius:var(--r3);width:100%;max-width:740px;margin:auto;padding:24px;animation:su .22s ease;box-shadow:0 24px 80px rgba(0,0,0,.8);}
    @keyframes su{from{transform:translateY(14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
    .modal-title{font-family:var(--font-disp);font-size:22px;font-weight:900;margin-bottom:3px;}
    .modal-sub{font-size:11px;color:var(--t2);margin-bottom:18px;}
    .modal-tabs{display:flex;gap:3px;margin-bottom:16px;background:var(--bg);border-radius:var(--r);padding:3px;}
    .modal-tab{flex:1;padding:7px 6px;border:none;background:transparent;color:var(--t2);border-radius:5px;cursor:pointer;font-family:var(--font-disp);font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;}
    .modal-tab.on{background:var(--acc);color:#000;}
    .m-sec{margin-bottom:18px;}
    .m-stitle{font-family:var(--font-disp);font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--b1);}
    .open-notice{display:flex;align-items:center;gap:8px;background:var(--acc-glow);border:1px solid rgba(232,160,32,.2);color:var(--acc);border-radius:var(--r);padding:9px 13px;font-size:11px;margin-bottom:11px;}
    .close-box{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;}
    .close-box-title{font-family:var(--font-disp);font-size:9px;font-weight:800;color:var(--t2);margin-bottom:11px;letter-spacing:.1em;text-transform:uppercase;}
    .out-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
    .out-btn{padding:12px 8px;border:1px solid var(--b2);background:var(--bg);color:var(--t2);border-radius:var(--r);cursor:pointer;font-family:var(--font-disp);font-size:12px;font-weight:800;text-align:center;transition:all .15s;}
    .out-btn.win.on{border-color:var(--grn);background:var(--grn-dim);color:var(--grn);}
    .out-btn.loss.on{border-color:var(--red);background:var(--red-dim);color:var(--red);}
    .out-btn.open.on{border-color:var(--acc);background:var(--acc-dim);color:var(--acc);}
    .hint{font-size:10px;color:var(--t2);border-left:2px solid rgba(232,160,32,.3);padding:7px 12px;margin-top:12px;line-height:1.65;}
    .emo-row{display:flex;gap:8px;flex-wrap:wrap;}
    .emo-btn{padding:8px 13px;border:1px solid var(--b2);background:var(--s2);border-radius:var(--r);cursor:pointer;font-size:17px;transition:all .15s;}
    .emo-btn.on{border-color:var(--acc);background:var(--acc-dim);}
    .atab-row{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;}
    .atab{padding:7px 13px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);border-radius:var(--r);cursor:pointer;font-family:var(--font-disp);font-size:11px;font-weight:800;transition:all .15s;}
    .atab.on{border-color:var(--acc);background:var(--acc-dim);color:var(--acc);}
    .stat-table{width:100%;border-collapse:collapse;font-size:11.5px;}
    .stat-table th{text-align:left;padding:7px 10px;font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--b1);font-family:var(--font-disp);font-weight:800;}
    .stat-table td{padding:9px 10px;border-bottom:1px solid var(--s2);}
    .stat-table tr:last-child td{border-bottom:none;}
    .filter-row{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
    .filter-btn{padding:5px 11px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);border-radius:var(--r);cursor:pointer;font-family:var(--font-disp);font-size:11px;font-weight:800;transition:all .15s;}
    .filter-btn.on{background:var(--acc);color:#000;border-color:var(--acc);}
    .open-banner{background:rgba(232,160,32,.04);border:1px solid rgba(232,160,32,.12);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:11px;color:var(--acc);}
    .empty{text-align:center;padding:40px 20px;color:var(--t2);font-size:12px;}
    .empty-icon{font-size:32px;margin-bottom:10px;opacity:.5;}
    .cot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:16px;}
    .cot-card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:14px;}
    .cot-pair{font-family:var(--font-disp);font-size:20px;font-weight:900;margin-bottom:10px;}
    .cot-bar-wrap{height:7px;background:var(--b1);border-radius:4px;margin-bottom:9px;display:flex;overflow:hidden;}
    .cot-seg-l{background:var(--grn);border-radius:4px 0 0 4px;transition:width .5s;}
    .cot-seg-s{background:var(--red);border-radius:0 4px 4px 0;transition:width .5s;}
    .cot-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px;}
    .cot-signal{display:inline-block;padding:3px 10px;border-radius:4px;font-family:var(--font-disp);font-size:11px;font-weight:800;margin-top:9px;}
    .cot-signal.bull{background:var(--grn-dim);color:var(--grn);}
    .cot-signal.bear{background:var(--red-dim);color:var(--red);}
    .cot-signal.neut{background:rgba(80,80,80,.12);color:var(--t2);}
    .spinner{width:16px;height:16px;border:2px solid var(--b2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .cot-date{font-size:9px;color:var(--t2);margin-top:6px;}
    @media(max-width:600px){
      .modes,.fgrid-3{grid-template-columns:1fr 1fr;}
      .fgrid{grid-template-columns:1fr 1fr;}
      .rgrid{grid-template-columns:1fr 1fr;}
      .kpi-grid{grid-template-columns:repeat(3,1fr);}
      .cot-grid{grid-template-columns:1fr 1fr;}
      .app{padding:0 10px 60px;}
      .modal{padding:16px;}
      .tab{font-size:10px;padding:8px 5px;}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const MODES={scalp:{label:"Scalping",tf:"M1/M5",risk:.25,rrMin:2},intraday:{label:"Intraday",tf:"M15/H1",risk:.5,rrMin:3},swing:{label:"Swing",tf:"H4/Daily",risk:1,rrMin:4}};
const ASSETS=["EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","USD/CHF","NZD/USD","EUR/GBP","EUR/JPY","GBP/JPY","EUR/AUD","EUR/CAD","EUR/CHF","GBP/AUD","GBP/CAD","GBP/CHF","AUD/JPY","CAD/JPY","CHF/JPY","NASDAQ","S&P 500","DAX","DOW JONES","FTSE MIB","RUSSELL 2000","FTSE 100","NIKKEI","GOLD","SILVER","OIL (WTI)","OIL (BRENT)","BTC/USD","ETH/USD","XRP/USD"];
const SETUPS=["Schema Istituzionale (Sweep + OB)","Sweep + FVG","CHoCH + OB","CHoCH + FVG","BOS + OB","London Judas Swing","ICT Silver Bullet","Reversal","Trend Following","Breakout","Pullback","Range Trading","Support/Resistance","Pattern"];
const TFS=["M1","M5","M10","M15","M30","H1","H2","H4","H8","Daily","Weekly","Monthly"];
const EMOS=["😤","😟","😐","🙂","😊"];
const EMO_L=["Pessimo","Negativo","Neutro","Positivo","Ottimo"];
const CHECKLISTS={
  scalp:{label:"Scalping",sections:[
    {id:"sc1",title:"1 · FINESTRA TEMPORALE",tf:"Orologio",items:[

const getAllIds=m=>(CHECKLISTS[m]?.sections||[]).flatMap(s=>s.items.map(i=>i.id));
const clScore=(m,ch)=>{const ids=getAllIds(m),done=ids.filter(id=>ch[id]).length;return{done,total:ids.length,pct:ids.length?Math.round(done/ids.length*100):0};};
const loadTrades=()=>{try{return JSON.parse(localStorage.getItem("tdpro_v2")||"[]");}catch{return[];}};

const fmtEur=v=>{if(v==null||isNaN(v))return"—";const x=+v;return(x>=0?"+":"")+x.toFixed(2)+"€";};
const fmtPct=v=>v==null||isNaN(v)?"—":(+v).toFixed(1)+"%";
function calcStats(trades){
  const s=loadSettings(),capital=parseFloat(s.capital)||10000;
  const closed=trades.filter(t=>t.outcome!=="open");
  const wins=closed.filter(t=>t.outcome==="win");
  const losses=closed.filter(t=>t.outcome==="loss");
  const totalPnl=closed.reduce((a,t)=>a+(parseFloat(t.pnlNetto)||0),0);
  const winPnl=wins.reduce((a,t)=>a+(parseFloat(t.pnlNetto)||0),0);
  const lossPnl=losses.reduce((a,t)=>a+(parseFloat(t.pnlNetto)||0),0);
  const wr=closed.length?wins.length/closed.length*100:0;
  const pf=lossPnl!==0?Math.abs(winPnl/lossPnl):winPnl>0?Infinity:0;
  const rrArr=closed.filter(t=>parseFloat(t.rr)>0).map(t=>parseFloat(t.rr));
  const avgRR=rrArr.length?rrArr.reduce((a,b)=>a+b,0)/rrArr.length:0;
  let equity=capital,maxEq=capital,maxDD=0;
  const curve=[{x:0,y:capital}];
  closed.forEach((t,i)=>{equity+=parseFloat(t.pnlNetto)||0;curve.push({x:i+1,y:+equity.toFixed(2)});if(equity>maxEq)maxEq=equity;const dd=equity-maxEq;if(dd<maxDD)maxDD=dd;});
  let maxCW=0,maxCL=0,cw=0,cl=0;
  closed.forEach(t=>{if(t.outcome==="win"){cw++;cl=0;if(cw>maxCW)maxCW=cw;}else{cl++;cw=0;if(cl>maxCL)maxCL=cl;}});
  const bestWin=wins.length?Math.max(...wins.map(t=>parseFloat(t.pnlNetto)||0)):0;
  const worstLoss=losses.length?Math.min(...losses.map(t=>parseFloat(t.pnlNetto)||0)):0;
  return{closed,wins,losses,totalPnl,winPnl,lossPnl,wr,pf,avgRR,curve,maxDD,maxCW,maxCL,capital,currentCapital:capital+totalPnl,avgWin:wins.length?winPnl/wins.length:0,avgLoss:losses.length?lossPnl/losses.length:0,bestWin,worstLoss};
}

function Analisi(){
  const trades=loadTrades();
  const [view,setView]=useState("asset");
  const closed=trades.filter(t=>t.outcome!=="open");
  const groupBy=key=>{const map={};closed.forEach(t=>{const k=t[key]||"Altro";if(!map[k])map[k]={key:k,n:0,wins:0,losses:0,pnl:0};map[k].n++;if(t.outcome==="win")map[k].wins++;else map[k].losses++;map[k].pnl+=parseFloat(t.pnlNetto)||0;});return Object.values(map).sort((a,b)=>b.n-a.n);};
  const DAY_MAP={0:"Domenica",1:"Lunedì",2:"Martedì",3:"Mercoledì",4:"Giovedì",5:"Venerdì",6:"Sabato"};
  const byDay=()=>{const map={};closed.forEach(t=>{const d=new Date(t.dateEntry||t.date);const k=DAY_MAP[d.getDay()]||"—";if(!map[k])map[k]={key:k,n:0,wins:0,losses:0,pnl:0};map[k].n++;if(t.outcome==="win")map[k].wins++;else map[k].losses++;map[k].pnl+=parseFloat(t.pnlNetto)||0;});return["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì"].map(d=>map[d]||{key:d,n:0,wins:0,losses:0,pnl:0});};
  const byEmo=()=>{const map={};closed.forEach(t=>{const k=t.emotion||"—";if(!map[k])map[k]={key:k,n:0,wins:0,losses:0,pnl:0};map[k].n++;if(t.outcome==="win")map[k].wins++;else map[k].losses++;map[k].pnl+=parseFloat(t.pnlNetto)||0;});return Object.values(map).sort((a,b)=>a.key-b.key);};
  const rows=view==="asset"?groupBy("symbol"):view==="setup"?groupBy("setup"):view==="day"?byDay():view==="emotion"?byEmo():groupBy("mode");
  return(
    <div>
      <div className="atab-row">
        {[["asset","💹 Asset"],["setup","🎯 Setup"],["mode","📊 Modalità"],["day","📅 Giorno"],["emotion","😊 Emozione"]].map(([k,l])=><div key={k} className={`atab ${view===k?"on":""}`} onClick={()=>setView(k)}>{l}</div>)}
      </div>
      {closed.length===0
        ?<div className="empty"><div className="empty-icon">📈</div>Chiudi dei trade per vedere le analisi.</div>
        :<div className="card" style={{padding:0,overflow:"hidden"}}>
          <div className="mobile-scroll">
            <table className="stat-table">
              <thead><tr><th>{view==="asset"?"Asset":view==="setup"?"Setup":view==="mode"?"Modalità":view==="day"?"Giorno":"Emozione"}</th><th>Trade</th><th>Wins</th><th>Losses</th><th>Win%</th><th>P&L Netto</th><th>Avg P&L</th></tr></thead>
              <tbody>
                {rows.map(r=>{
                  const wr=r.n>0?(r.wins/r.n*100).toFixed(0):0;
                  const avg=r.n>0?r.pnl/r.n:0;
                  const label=view==="emotion"&&r.key!=="—"?`${EMOS[r.key-1]} ${EMO_L[r.key-1]||""}`:r.key;
                  return(<tr key={r.key}><td style={{fontWeight:600}}>{label}</td><td>{r.n}</td><td style={{color:"var(--grn)"}}>{r.wins}</td><td style={{color:"var(--red)"}}>{r.losses}</td><td style={{color:+wr>=50?"var(--grn)":"var(--red)"}}>{r.n>0?wr+"%":"—"}</td><td style={{color:r.pnl>=0?"var(--grn)":"var(--red)",fontWeight:700}}>{fmtEur(r.pnl)}</td><td style={{color:avg>=0?"var(--grn)":"var(--red)"}}>{r.n>0?fmtEur(avg):"—"}</td></tr>);
                })}
              </tbody>
            </table>
          </div>
        </div>
      }
    </div>
  );
}

                  <div className="cot-row"><span>Long assoluti:</span><span style={{color:"var(--grn)"}}>{d.long.toLocaleString()}</span></div>
                  <div className="cot-row"><span>Short assoluti:</span><span style={{color:"var(--red)"}}>{d.short.toLocaleString()}</span></div>
                  <div className="cot-row"><span>Posizione netta:</span><span style={{color:d.net>=0?"var(--grn)":"var(--red)"}}>{d.net>=0?"+":""}{d.net.toLocaleString()}</span></div>
                  <div className="cot-date">Ultima rilevazione: {d.date}</div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div className="card">
        <div className="card-title"><div className="card-title-dot"/>Come usare il COT nel tuo schema istituzionale</div>
        <div style={{fontSize:11,color:"var(--t1)",lineHeight:1.8}}>
          <p style={{marginBottom:8}}>1. <strong style={{color:"var(--acc)"}}>Confluenza direzionale</strong>: usa il COT per confermare il bias Monthly/Weekly prima di cercare un OB su H4.</p>
          <p style={{marginBottom:8}}>2. <strong style={{color:"var(--acc)"}}>Extreme positioning</strong>: quando i large speculators sono su posizioni estreme (netto molto alto o basso), aumenta la probabilità di un reversal istituzionale.</p>
          <p style={{marginBottom:8}}>3. <strong style={{color:"var(--acc)"}}>Non contro il flusso</strong>: se COT EUR/USD è fortemente bullish, evita short di swing a meno di un'invalidazione strutturale forte.</p>
          <p>4. <strong style={{color:"var(--acc)"}}>Cambio di posizionamento</strong>: il segnale più forte non è il valore assoluto, ma il cambio di direzione del netto settimana su settimana.</p>
        </div>
      </div>
    </div>
  );
}
function App(){
  const [tab,setTab]=useState("calc");
  const [modal,setModal]=useState(null);
  const [openCount,setOpenCount]=useState(()=>loadTrades().filter(t=>t.outcome==="open").length);
  const [jKey,setJKey]=useState(0);
  const s=loadSettings();
  const capital=parseFloat(s.capital)||10000;
  const totalPnl=loadTrades().filter(t=>t.outcome!=="open").reduce((a,t)=>a+(parseFloat(t.pnlNetto)||0),0);
  const handleSaveNew=data=>{
    const current=loadTrades();
    saveTrades([{...data,id:Date.now().toString(),createdAt:new Date().toISOString()},...current]);
    setModal(null);setJKey(k=>k+1);setTab("journal");
  };
  const TABS=[
    {k:"calc",label:"Size"},
    {k:"journal",label:"Journal",badge:openCount},
    {k:"dashboard",label:"Dash"},
    {k:"analisi",label:"Analisi"},
    {k:"checklist",label:"Check"},
    {k:"cot",label:"COT"},
  ];
  return(
    <>
      {modal&&<TradeModal data={modal} isNew={true} onClose={()=>setModal(null)} onSave={handleSaveNew}/>}
      <div className="app">
        <div className="hdr">
          <div className="hdr-left">
            <div className="hdr-logo">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#000"><rect x="2" y="2" width="9" height="9" rx="1"/><rect x="13" y="2" width="9" height="9" rx="1"/><rect x="2" y="13" width="9" height="9" rx="1"/><circle cx="17.5" cy="17.5" r="4.5"/></svg>
            </div>
            <div>
              <div className="hdr-title">TRADING DESK PRO</div>
              <div className="hdr-sub">Schemi Istituzionali · Prop 10K</div>
            </div>
          </div>
          <div className="capital-chip">{(capital+totalPnl).toFixed(0)}€</div>
        </div>
        <div className="tabs">
          {TABS.map(({k,label,badge})=>(
            <button key={k} className={`tab ${tab===k?"on":""}`} onClick={()=>setTab(k)}>
              {label}{badge>0&&<span className="tab-badge">{badge}</span>}
            </button>
          ))}
        </div>
        {tab==="calc"&&<Calculator onOpenModal={setModal}/>}
        {tab==="journal"&&<Journal refreshKey={jKey} onCountChange={setOpenCount}/>}
        {tab==="dashboard"&&<Dashboard/>}
        {tab==="analisi"&&<Analisi/>}
        {tab==="checklist"&&<ChecklistTab/>}
        {tab==="cot"&&<CotTab/>}
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js"));</script>
</body>
</html>
